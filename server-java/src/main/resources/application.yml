spring:
  application:
    name: fantasy-realm-server

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fantasyrealm}
    username: ${DB_USER:fro}
    password: ${DB_PASS:fro123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}

server:
  port: ${HTTP_PORT:8080}
  servlet:
    context-path: /

game:
  server:
    port: ${GAME_PORT:7777}
    boss-threads: 2
    worker-threads: 8
  security:
    jwt-secret: ${JWT_SECRET:fantasy_realm_secret_key_must_be_32_chars_minimum!}
    jwt-expiry-hours: 72
  admin:
    username: ${ADMIN_USER:gm}
    password: ${ADMIN_PASS:gm_secret_2024}

logging:
  level:
    com.fantasyrealm: INFO
    org.springframework: WARN
    io.netty: WARN
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
