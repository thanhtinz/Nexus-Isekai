name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  server-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build server
        run: cd server && mvn -B clean package -DskipTests
      - name: Run server tests
        run: cd server && mvn -B test

  webshop-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install + build
        run: cd webshop && npm ci && npm run build
      - name: Lint
        run: cd webshop && npm run lint --if-present

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for hardcoded secrets
        run: |
          ! grep -rn "ghp_\|password.*=.*['\"][^'\"]*['\"]" --include="*.java" --include="*.ts" . || echo "WARNING: possible secrets found"
