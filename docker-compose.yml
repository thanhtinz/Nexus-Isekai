version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       fantasyrealm
      POSTGRES_USER:     fro
      POSTGRES_PASSWORD: ${DB_PASS:-fro123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server-java/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U fro -d fantasyrealm"]
      interval: 10s timeout: 5s retries: 5

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fro-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS:-redis123} --maxmemory 256mb
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD","redis-cli","-a","${REDIS_PASS:-redis123}","ping"]
      interval: 10s timeout: 5s retries: 5

  # ── Game Server SV1 (Main) ────────────────────────────────────────
  game-sv1:
    build:
      context: ./server-java
      dockerfile: Dockerfile
    image: fro-game-server:latest
    container_name: fro-game-sv1
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DB_URL:      jdbc:postgresql://postgres:5432/fantasyrealm
      DB_USER:     fro
      DB_PASS:     ${DB_PASS:-fro123}
      REDIS_HOST:  redis
      GAME_PORT:   7777
      HTTP_PORT:   8080
      JWT_SECRET:  ${JWT_SECRET:-fantasy_realm_secret_32chars_min!}
      ADMIN_USER:  ${ADMIN_USER:-gm}
      ADMIN_PASS:  ${ADMIN_PASS:-gm_secret_2024}
      SERVER_NAME: "Server 1"
      SERVER_TYPE: live
    ports:
      - "7777:7777"
      - "8080:8080"
    volumes:
      - sv1_logs:/app/logs
    healthcheck:
      test: ["CMD","wget","-qO-","http://localhost:8080/api/admin/status","||","exit","1"]
      interval: 30s timeout: 10s retries: 3 start_period: 60s

  # ── Game Server BETA ──────────────────────────────────────────────
  game-beta:
    image: fro-game-server:latest
    container_name: fro-game-beta
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DB_URL:      jdbc:postgresql://postgres:5432/fantasyrealm_beta
      DB_USER:     fro
      DB_PASS:     ${DB_PASS:-fro123}
      REDIS_HOST:  redis
      GAME_PORT:   7778
      HTTP_PORT:   8081
      JWT_SECRET:  ${JWT_SECRET:-fantasy_realm_secret_32chars_min!}
      ADMIN_USER:  gm
      ADMIN_PASS:  ${ADMIN_PASS:-gm_secret_2024}
      SERVER_NAME: "Server Beta"
      SERVER_TYPE: beta
    ports:
      - "7778:7778"
      - "8081:8081"

  # ── Admin Panel (Node.js) ────────────────────────────────────────
  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: fro-admin
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST:         postgres
      DB_PORT:         5432
      DB_NAME:         fantasyrealm
      DB_USER:         fro
      DB_PASS:         ${DB_PASS:-fro123}
      REDIS_HOST:      redis
      REDIS_PORT:      6379
      REDIS_PASS:      ${REDIS_PASS:-redis123}
      PORT:            3000
      SESSION_SECRET:  ${SESSION_SECRET:-admin_secret_2024}
      DOCKER_SOCKET:   /var/run/docker.sock
      UPLOAD_DIR:      /app/uploads
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - admin_uploads:/app/uploads
    healthcheck:
      test: ["CMD","wget","-qO-","http://localhost:3000/","||","exit","1"]
      interval: 15s timeout: 5s retries: 3

  # ── Landing Page / Website ────────────────────────────────────────
  website:
    build:
      context: ./landing-page
      dockerfile: Dockerfile
    container_name: fro-website
    restart: unless-stopped
    depends_on:
      - admin-panel
    environment:
      WEBSITE_PORT:    4000
      ADMIN_API_URL:   http://admin-panel:3000/api/v1
    ports:
      - "4000:4000"

  # ── Nginx Reverse Proxy ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: fro-nginx
    restart: unless-stopped
    depends_on:
      - website
      - admin-panel
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro

volumes:
  postgres_data:
  redis_data:
  sv1_logs:
  admin_uploads:
