version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       fantasyrealm
      POSTGRES_USER:     fro
      POSTGRES_PASSWORD: ${DB_PASS:-fro123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server-java/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U fro -d fantasyrealm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fro-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS:-redis123} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD","redis-cli","-a","${REDIS_PASS:-redis123}","ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Game Server ─────────────────────────────────────────
  game-server:
    build:
      context: ./server-java
      dockerfile: Dockerfile
    container_name: fro-game-server
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DB_URL:      jdbc:postgresql://postgres:5432/fantasyrealm
      DB_USER:     fro
      DB_PASS:     ${DB_PASS:-fro123}
      REDIS_HOST:  redis
      REDIS_PORT:  6379
      REDIS_PASS:  ${REDIS_PASS:-redis123}
      GAME_PORT:   7777
      HTTP_PORT:   8080
      JWT_SECRET:  ${JWT_SECRET:-fantasy_realm_secret_key_minimum_32_chars_ok!}
      ADMIN_USER:  ${ADMIN_USER:-gm}
      ADMIN_PASS:  ${ADMIN_PASS:-gm_secret_2024}
      JPA_DDL:     update
      JAVA_OPTS:   "-Xms512m -Xmx2g -XX:+UseG1GC"
    ports:
      - "7777:7777"   # Game TCP
      - "8080:8080"   # Admin REST API
    volumes:
      - game_logs:/app/logs
    healthcheck:
      test: ["CMD","wget","-qO-","http://localhost:8080/api/admin/status","||","exit","1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── GM Dashboard ────────────────────────────────────────
  gm-dashboard:
    image: nginx:alpine
    container_name: fro-gm-dashboard
    restart: unless-stopped
    depends_on:
      - game-server
    ports:
      - "9090:80"
    volumes:
      - ./tools-gm:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
  game_logs:
