version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: nexus_isekai
      MYSQL_USER: nexus
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../server/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../server/src/main/resources/schema_v2.sql:/docker-entrypoint-initdb.d/02-schema_v2.sql
    command: --innodb-buffer-pool-size=8G --max-connections=1000
    ports: ["3306:3306"]
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 3gb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    ports: ["6379:6379"]
    restart: always

  game-server:
    build:
      context: ../server
      dockerfile: Dockerfile
    env_file: .env
    depends_on: [mysql, redis]
    ports:
      - "7777:7777"   # game TCP
      - "8080:8080"   # admin API (chặn từ ngoài qua firewall)
    deploy:
      resources:
        limits: { memory: 6G }
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ../webshop/dist:/usr/share/nginx/html
      - ./certs:/etc/letsencrypt
    ports: ["443:443", "80:80"]
    depends_on: [game-server]
    restart: always

volumes:
  mysql_data:
  redis_data:
