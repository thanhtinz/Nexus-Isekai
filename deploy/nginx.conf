# Fantasy Realm Online — Nginx Reverse Proxy

upstream website    { server website:4000; }
upstream admin      { server admin-panel:3000; }
upstream game_sv1   { server game-sv1:8080; }
upstream game_beta  { server game-beta:8081; }

server {
    listen 80;
    server_name fantasyrealm.vn www.fantasyrealm.vn;

    # Website
    location / {
        proxy_pass http://website;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Admin Panel (subdomain-like path)
    location /admin/ {
        proxy_pass http://admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # SV1 Admin API
    location /sv1/ {
        proxy_pass http://game_sv1/;
        auth_basic "Admin Only";
        proxy_set_header Host $host;
    }

    # Beta Admin API
    location /beta/ {
        proxy_pass http://game_beta/;
        proxy_set_header Host $host;
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    client_max_body_size 20M;
}

# Admin panel on separate subdomain/port
server {
    listen 3001;
    server_name _;
    location / {
        proxy_pass http://admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
